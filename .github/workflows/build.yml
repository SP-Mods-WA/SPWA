name: Build WhatsApp APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: 🤖 Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WhatsApp-v${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 60

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "WhatsApp Mobile v1.0.${{ github.run_number }}"
          body: |
            ## 📱 WhatsApp Mobile App
            
            **Install කරන්නේ කොහොමද:**
            1. `app-debug.apk` download කරන්න
            2. Phone Settings → Security → Unknown Sources → ON
            3. APK tap කරලා install කරන්න
            4. Open කරන්න → QR scan කරන්න → Done! ✅
            
            > WhatsApp Web mobile-optimized version
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
