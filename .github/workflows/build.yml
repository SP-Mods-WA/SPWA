name: Build SP WhatsApp APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/SP-WhatsApp-v1.0.${{ github.run_number }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SP-WhatsApp-Debug-v1.0.${{ github.run_number }}
          path: app/build/outputs/apk/debug/SP-WhatsApp-v1.0.${{ github.run_number }}.apk
          retention-days: 60

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "SP WhatsApp v1.0.${{ github.run_number }}"
          draft: false
          prerelease: false
          body: |
            ## SP WhatsApp v1.0.${{ github.run_number }}
            
            ### ✅ Features
            - WhatsApp Web with custom dark UI
            - 3 Account support (switch between accounts)
            - Chat tabs: All / Groups / Unread / Favourites
            - App Lock with PIN + Fingerprint
            - DND Mode (disconnect SP WhatsApp only)
            - Dark Mode
            - Media download manager
            - Auto-reply (settings)
            - Pull to refresh
            - Offline page with retry
            
            ### 📱 Install
            1. Download **SP-WhatsApp-v1.0.${{ github.run_number }}.apk**
            2. Enable "Install from unknown sources" on your Android
            3. Install and enjoy!
            
            > Requires Android 5.0 (Lollipop) or higher
          files: app/build/outputs/apk/debug/SP-WhatsApp-v1.0.${{ github.run_number }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

